<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 World Cup 2026 - Elite Bracket</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 0.5rem 0;
        }
        .profile-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 3rem; }
        .profile-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .profile-btn.active {
            color: white;
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .bracket-container { display: flex; gap: 2.5rem; overflow-x: auto; padding: 1rem 0; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 240px; }
        .round-title { text-align: center; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; font-weight: 700; }
        .matchup { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 6px; margin: 1rem 0; }
        .team-slot { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.8rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .team-slot:hover { background: rgba(255, 255, 255, 0.05); }
        .team-slot.selected { background: rgba(34, 197, 94, 0.15); color: #4ade80; font-weight: 700; }
        .action-container { display: flex; justify-content: center; margin-top: 3rem; }
        .share-btn { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; border: none; padding: 1rem 2.5rem; font-size: 1rem; font-weight: 700; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>
    <header>
        <h1>WORLD CUP 2026 BRACKET</h1>
        <p style="color: var(--text-muted);">Switch profiles, make predictions, share custom links.</p>
    </header>
    <div class="profile-bar">
        <button class="profile-btn active" onclick="switchProfile(0)">Your Bracket</button>
        <button class="profile-btn" onclick="switchProfile(1)">Friend 1</button>
        <button class="profile-btn" onclick="switchProfile(2)">Friend 2</button>
        <button class="profile-btn" onclick="switchProfile(3)">Friend 3</button>
    </div>
    <div class="bracket-container" id="bracket"></div>
    <div class="action-container"><button class="share-btn" onclick="shareBracket()">🔗 Copy Shareable Web Link</button></div>
<script>
    const initialTeams = [
        ["South Africa", "Canada"], ["Brazil", "Japan"], ["Germany", "Paraguay"], ["Netherlands", "Morocco"],
        ["Ivory Coast", "Norway"], ["France", "Sweden"], ["Mexico", "Ecuador"], ["England", "DR Congo"],
        ["Belgium", "Senegal"], ["United States", "Bosnia"], ["Spain", "Austria"], ["Portugal", "Croatia"],
        ["Switzerland", "Algeria"], ["Australia", "Egypt"], ["Argentina", "Cabo Verde"], ["Colombia", "Ghana"]
    ];
    let currentProfile = 0;
    let globalStore = [{}, {}, {}, {}];
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('d')) {
        try { globalStore = JSON.parse(atob(urlParams.get('d'))); } catch(e) {}
    }
    const roundNames = ["Round of 32", "Round of 16", "Quarter-finals", "Semi-finals", "Final"];
    function buildBracket() {
        const container = document.getElementById('bracket');
        container.innerHTML = '';
        let currentRoundMatches = initialTeams.map((teams, index) => ({ id: `r1-m${index}`, teams }));
        let profileData = globalStore[currentProfile];
        for (let r = 0; r < 5; r++) {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'round';
            roundDiv.innerHTML = `<div class="round-title">${roundNames[r]}</div>`;
            let nextRoundMatches = [];
            for (let m = 0; m < currentRoundMatches.length; m++) {
                const match = currentRoundMatches[m];
                const matchDiv = document.createElement('div');
                matchDiv.className = 'matchup';
                const savedWinner = profileData[match.id];
                match.teams.forEach(team => {
                    const slot = document.createElement('div');
                    slot.className = `team-slot ${savedWinner === team ? 'selected' : ''}`;
                    slot.innerText = team || 'TBD';
                    if(team) { slot.onclick = () => selectWinner(r, m, match.id, team); }
                    matchDiv.appendChild(slot);
                });
                roundDiv.appendChild(matchDiv);
                if (m % 2 === 0) {
                    let nextMatchId = `r${r+2}-m${Math.floor(m/2)}`;
                    let nextTeams = [profileData[match.id] || null];
                    let siblingMatch = currentRoundMatches[m+1];
                    if (siblingMatch) { nextTeams.push(profileData[siblingMatch.id] || null); }
                    nextRoundMatches.push({ id: nextMatchId, teams: nextTeams });
                }
            }
            container.appendChild(roundDiv);
            currentRoundMatches = nextRoundMatches;
        }
        const champRound = document.createElement('div');
        champRound.className = 'round';
        champRound.innerHTML = `<div class="round-title">🏆 Champion</div>`;
        const champMatch = currentRoundMatches[0];
        const champName = profileData[champMatch?.id] || 'TBD';
        champRound.innerHTML += `<div class="matchup" style="border-color:gold; text-align:center; padding: 15px; font-weight:800; color:gold;">${champName}</div>`;
        container.appendChild(champRound);
    }
    function selectWinner(roundIdx, matchIdx, matchId, selectedTeam) {
        globalStore[currentProfile][matchId] = selectedTeam;
        buildBracket();
    }
    function switchProfile(id) {
        currentProfile = id;
        document.querySelectorAll('.profile-btn').forEach((btn, idx) => { btn.classList.toggle('active', idx === id); });
        buildBracket();
    }
    function shareBracket() {
        const payload = btoa(JSON.stringify(globalStore));
        const shareUrl = `${window.location.origin}${window.location.pathname}?d=${payload}`;
        navigator.clipboard.writeText(shareUrl).then(() => { alert("🔗 Application URL copied! Share it with your friends."); });
    }
    buildBracket();
</script>
</body>
</html>
