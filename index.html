<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 World Cup 2026 - Ultimate Arena Pro</title>
    <style>
        :root {
            --bg-layer: linear-gradient(135deg, rgba(10, 15, 30, 0.92) 0%, rgba(20, 18, 55, 0.96) 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            position: relative;
        }
        body::before {
            content: ""; position: absolute; top:0; left:0; right:0; bottom:0;
            background: var(--bg-layer); z-index: 0;
        }
        header, .dashboard-grid, .profile-bar, .bracket-container, .action-container, .status-bar, .admin-panel, .rules-modal {
            position: relative; z-index: 1;
        }
        header { text-align: center; margin-bottom: 0.5rem; }
        h1 {
            font-weight: 900; letter-spacing: -0.05em;
            background: linear-gradient(to right, #4f46e5, #c084fc, #db2777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 0.5rem 0; text-transform: uppercase;
        }
        .status-bar { text-align: center; font-size: 0.85rem; margin-bottom: 1.5rem; color: #10b981; font-weight: 600; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; margin-bottom: 2rem; }
        @media(max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .pane { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.25rem; backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: relative; }
        .pane-title { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin-top: 0; margin-bottom: 1rem; color: #f1f5f9; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        
        .rules-btn { background: rgba(99, 102, 241, 0.2); border: 1px solid var(--accent-glow); color: #a5b4fc; padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .rules-btn:hover { background: var(--accent-glow); color: white; }

        .leaderboard-row { display: flex; justify-content: space-between; padding: 0.65rem 0.75rem; margin: 6px 0; border-radius: 10px; background: rgba(255,255,255,0.02); font-weight: 600; }
        .leaderboard-row.rank-0 { background: rgba(234, 179, 8, 0.15); border: 1px solid rgba(234, 179, 8, 0.3); color: #fde047; }
        
        .trash-input-box { display: flex; gap: 8px; margin-top: 1rem; }
        .chat-input { flex-grow: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; padding: 0.6rem; border-radius: 10px; font-weight: 500; }
        .chat-btn { background: #6366f1; color: white; border: none; padding: 0 1rem; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .wall-msg { font-size: 0.9rem; padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .profile-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
        .profile-btn {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            color: var(--text-muted); padding: 0.75rem 1.5rem; border-radius: 14px;
            cursor: pointer; font-weight: 700; transition: all 0.2s ease;
        }
        .profile-btn.active { color: white; background: rgba(99, 102, 241, 0.35); border-color: #818cf8; }
        
        .bracket-container { display: flex; gap: 2.5rem; overflow-x: auto; padding: 1rem 0; }
        .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 280px; }
        .round-title { text-align: center; font-size: 0.85rem; text-transform: uppercase; color: #cbd5e1; margin-bottom: 1rem; font-weight: 800; }
        .matchup { background: rgba(15, 23, 42, 0.55); border: 1px solid var(--glass-border); border-radius: 16px; padding: 8px; margin: 1rem 0; }
        .team-slot { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 0.85rem; border-radius: 10px; cursor: pointer; transition: all 0.15s ease; margin: 4px 0; }
        .team-meta { display: flex; align-items: center; gap: 10px; pointer-events: none; }
        .flag-img { width: 24px; height: 16px; object-fit: cover; border-radius: 3px; }
        .score-input { width: 35px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.15); color: #fff; text-align: center; padding: 4px; border-radius: 6px; font-weight: 700; }
        .team-slot.selected { background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #4ade80; }

        .modal
